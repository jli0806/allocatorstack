        answer_type: text
        required: true
      - id: fees_terms_3
        text: "What is the carried interest rate and preferred return (hurdle rate)?"
        answer_type: text
        required: true
      - id: fees_terms_4
        text: "Is carried interest calculated on a whole-fund or deal-by-deal basis?"
        answer_type: text
        required: true
      - id: fees_terms_5
