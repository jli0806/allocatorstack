        text: "Describe your approach to currency risk, interest rate risk, and inflation risk."
        answer_type: text
        required: false
      - id: risk_management_14
        text: "What third-party risk tools or systems do you use?"
        answer_type: text
        required: false
      - id: risk_management_15
        text: "Describe your approach to climate-related financial risk."
        answer_type: text
        required: false

  - id: compliance
    name: "Compliance & Regulatory"
    questions:
      - id: compliance_1
        text: "Is the firm registered with the SEC as an investment adviser? Provide CRD number."
        answer_type: text
        required: true
      - id: compliance_2
        text: "List all regulatory registrations and licenses held by the firm and its principals."
        answer_type: list
        required: true
      - id: compliance_3
        text: "Has the firm or any principal ever been subject to any regulatory investigation, enforcement action, or sanction?"
        answer_type: text
        required: true
      - id: compliance_4
        text: "Describe the firm's compliance program, including the role and reporting line of the Chief Compliance Officer."
        answer_type: text
        required: true
      - id: compliance_5
        text: "How frequently is the compliance program reviewed and tested?"
        answer_type: text
        required: true
      - id: compliance_6
