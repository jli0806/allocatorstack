        text: "Describe the firm's insider trading prevention policies and procedures."
        answer_type: text
        required: true
      - id: compliance_15
        text: "What is the firm's approach to ERISA compliance (if accepting plan assets)?"
        answer_type: text
        required: false
      - id: compliance_16
        text: "Describe any pending or threatened litigation involving the firm or its principals."
        answer_type: text
        required: true
      - id: compliance_17
        text: "Has the firm filed any amended ADV disclosures in the past 2 years related to disciplinary events?"
        answer_type: boolean
