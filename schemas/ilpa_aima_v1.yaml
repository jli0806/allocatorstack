# ILPA/AIMA DDQ Question Taxonomy — v1 Schema
# Maps ~200 standard due diligence questions across 9 categories.
# Based on the ILPA Due Diligence Questionnaire and AIMA DDQ templates.
# Extensible: institutions can add custom questions under "custom" category.
#
# Each question has:
#   id: unique identifier (category prefix + number)
#   text: the question text
#   answer_type: text | numeric | boolean | date | list
#   required: whether the question must be answered

version: "1.0"

categories:
  - id: investment_strategy
    name: "Investment Strategy & Process"
    questions:
      - id: investment_strategy_1
        text: "Describe your firm's investment strategy and philosophy."
        answer_type: text
        required: true
      - id: investment_strategy_2
        text: "What is your target market segment, geography, and sector focus?"
        answer_type: text
        required: true
      - id: investment_strategy_3
        text: "Describe your investment process from sourcing to exit."
        answer_type: text
        required: true
      - id: investment_strategy_4
        text: "What is your target fund size and investment period?"
        answer_type: text
        required: true
      - id: investment_strategy_5
        text: "What is your typical deal size range?"
        answer_type: text
        required: true
      - id: investment_strategy_6
        text: "Describe your sourcing process and competitive advantages in deal origination."
        answer_type: text
        required: true
      - id: investment_strategy_7
        text: "What is your due diligence process for evaluating potential investments?"
        answer_type: text
        required: true
      - id: investment_strategy_8
        text: "Describe your portfolio construction approach, including diversification targets."
        answer_type: text
        required: true
      - id: investment_strategy_9
        text: "What is your approach to value creation post-investment?"
        answer_type: text
        required: true
      - id: investment_strategy_10
        text: "Describe your exit strategy and typical holding period."
        answer_type: text
        required: true
      - id: investment_strategy_11
        text: "How does the current fund strategy differ from prior funds?"
        answer_type: text
        required: true
      - id: investment_strategy_12
        text: "What is your approach to co-investment opportunities?"
        answer_type: text
        required: false
      - id: investment_strategy_13
        text: "Describe any use of leverage at the fund and/or portfolio company level."
        answer_type: text
        required: true
      - id: investment_strategy_14
        text: "What percentage of capital is typically invested vs. held in reserve?"
        answer_type: numeric
        required: false
      - id: investment_strategy_15
        text: "Describe your investment committee process and approval requirements."
        answer_type: text
        required: true
      - id: investment_strategy_16
        text: "What is the maximum single investment as a percentage of the fund?"
        answer_type: numeric
        required: true
      - id: investment_strategy_17
        text: "Describe any constraints on the types of investments the fund may make."
        answer_type: text
        required: false
      - id: investment_strategy_18
        text: "How do you manage currency risk in international investments?"
        answer_type: text
        required: false
      - id: investment_strategy_19
        text: "What market conditions or environments would be most challenging for your strategy?"
        answer_type: text
        required: true
      - id: investment_strategy_20
        text: "Describe your approach to sustainability integration within the investment process."
        answer_type: text
        required: false

  - id: organization
    name: "Organization & Team"
    questions:
      - id: organization_1
        text: "Provide an organizational chart showing all investment and non-investment professionals."
        answer_type: text
        required: true
      - id: organization_2
        text: "List all senior investment professionals, their titles, years at the firm, and years of relevant experience."
        answer_type: list
        required: true
      - id: organization_3
        text: "How many total employees does the firm have? Break down by investment, operations, compliance, and other."
        answer_type: numeric
        required: true
      - id: organization_4
        text: "Describe the ownership structure of the management company."
        answer_type: text
        required: true
      - id: organization_5
        text: "Has there been any change in ownership in the last 5 years? If so, describe."
        answer_type: text
        required: true
      - id: organization_6
        text: "Identify the key persons for the fund. What are the key person provisions?"
        answer_type: text
        required: true
      - id: organization_7
        text: "Have any key investment professionals departed in the last 3 years? If so, describe the circumstances."
        answer_type: text
        required: true
      - id: organization_8
        text: "Describe the compensation structure for investment professionals, including carried interest allocation."
        answer_type: text
        required: true
      - id: organization_9
        text: "What is the GP commitment to the fund (dollar amount and percentage)?"
        answer_type: text
        required: true
      - id: organization_10
        text: "Describe any succession planning for senior leadership."
        answer_type: text
        required: true
      - id: organization_11
        text: "List all other funds or accounts managed by the firm, including assets under management for each."
        answer_type: list
        required: true
      - id: organization_12
        text: "What is the firm's total assets under management?"
        answer_type: numeric
        required: true
      - id: organization_13
        text: "Describe any strategic partnerships, joint ventures, or affiliated entities."
        answer_type: text
        required: false
      - id: organization_14
        text: "What is the firm's policy on personal trading by employees?"
        answer_type: text
        required: true
      - id: organization_15
        text: "Describe the firm's insurance coverage (E&O, D&O, cyber, fidelity)."
        answer_type: text
        required: true
      - id: organization_16
        text: "Where are the firm's offices located? How many investment professionals are in each office?"
        answer_type: text
        required: true
      - id: organization_17
        text: "Describe any pending or anticipated organizational changes."
        answer_type: text
        required: false
      - id: organization_18
        text: "What is the firm's approach to professional development and training?"
        answer_type: text
        required: false
      - id: organization_19
        text: "Has the firm or any principal been involved in any material litigation in the past 10 years?"
        answer_type: text
        required: true
      - id: organization_20
        text: "Describe the firm's business continuity and disaster recovery plan."
        answer_type: text
        required: true
      - id: organization_21
        text: "What are the firm's work-from-home and remote work policies?"
        answer_type: text
        required: false
      - id: organization_22
        text: "List the firm's key service providers (administrator, auditor, legal counsel, prime broker, custodian)."
        answer_type: list
        required: true

  - id: track_record
    name: "Track Record & Attribution"
    questions:
      - id: track_record_1
        text: "Provide gross and net returns for each fund/vehicle managed by the firm since inception."
        answer_type: text
        required: true
      - id: track_record_2
        text: "Provide IRR, TVPI, DPI, and RVPI for each prior fund (for PE/VC strategies)."
        answer_type: text
        required: true
      - id: track_record_3
        text: "Provide annualized returns (1, 3, 5, 10 year and since inception) net of all fees."
        answer_type: text
        required: true
      - id: track_record_4
        text: "What is the relevant benchmark for the strategy? Provide benchmark returns for the same periods."
        answer_type: text
        required: true
      - id: track_record_5
        text: "Provide a quarterly return history for the most recent 5 years."
        answer_type: text
        required: true
      - id: track_record_6
        text: "Describe performance attribution — what drove returns in each period?"
        answer_type: text
        required: true
      - id: track_record_7
        text: "What was the fund's performance during significant market downturns (2008, 2020, 2022)?"
        answer_type: text
        required: true
      - id: track_record_8
        text: "Provide the maximum drawdown and recovery period for each fund."
        answer_type: text
        required: true
      - id: track_record_9
        text: "How many investments has the firm made across all funds? What is the realized vs. unrealized split?"
        answer_type: text
        required: true
      - id: track_record_10
        text: "List the top 5 and bottom 5 investments by return multiple. Describe lessons learned from losses."
        answer_type: text
        required: true
      - id: track_record_11
        text: "What percentage of investments have been fully or partially written off?"
        answer_type: numeric
        required: true
      - id: track_record_12
        text: "Provide dispersion of returns across individual investments."
        answer_type: text
        required: false
      - id: track_record_13
        text: "Has the track record been audited by a third party? If so, by whom?"
        answer_type: text
        required: true
      - id: track_record_14
        text: "Are the reported returns GIPS-compliant? If not, explain any deviations."
        answer_type: boolean
        required: true
      - id: track_record_15
        text: "How is unrealized portfolio valued? Describe the valuation methodology and frequency."
        answer_type: text
        required: true
      - id: track_record_16
        text: "What is the current portfolio composition by sector, geography, and vintage year?"
        answer_type: text
        required: true
      - id: track_record_17
        text: "Describe the J-curve profile of prior funds (for PE/VC strategies)."
        answer_type: text
        required: false
      - id: track_record_18
        text: "What is the consistency of returns across market cycles?"
        answer_type: text
        required: true
      - id: track_record_19
        text: "Provide Sharpe ratio, Sortino ratio, and information ratio for applicable strategies."
        answer_type: text
        required: false
      - id: track_record_20
        text: "How do you handle the track record when team members join or depart?"
        answer_type: text
        required: false

  - id: fees_terms
